<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trova il Pixel Vincente</title>
  <style>
    :root {
      --bg: #0d1117;
      --panel: #161b22;
      --border: #30363d;
      --pixel: #21262d;
      --pixel-hover: #30363d;
      --text: #c9d1d9;
      --accent: #58a6ff;
      --win: #39ff14;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 20px;
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 500;
      letter-spacing: 1px;
    }

    #counter {
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 16px;
      font-size: 0.95rem;
    }

    #counter strong {
      color: var(--accent);
    }

    #message {
      min-height: 1.5em;
      font-size: 1rem;
      transition: color 0.3s;
    }

    #message.win {
      color: var(--win);
    }

    #message.lose {
      color: var(--accent);
    }

    #grid {
      display: grid;
      gap: 1px;
    }

    .pixel {
      width: 12px;
      height: 12px;
      background-color: var(--pixel);
      cursor: pointer;
      transition: background-color 0.15s;
    }

    .pixel:hover {
      background-color: var(--pixel-hover);
    }

    .pixel.wrong {
      background-color: var(--accent);
    }

    .pixel.winner {
      background-color: var(--win);
      box-shadow: 0 0 8px var(--win);
    }

    #tooltip {
      position: fixed;
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.8rem;
      pointer-events: none;
      display: none;
      z-index: 10;
      white-space: nowrap;
    }

    #overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    #overlay.visible {
      display: flex;
    }

    #popup {
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      max-width: 420px;
      width: 90%;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
    }

    #popup h2 {
      font-size: 1.2rem;
      font-weight: 600;
    }

    #popup p {
      font-size: 0.95rem;
      line-height: 1.5;
    }

    #ref-link {
      background-color: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 0.85rem;
      color: var(--accent);
      word-break: break-all;
      user-select: all;
    }

    .popup-buttons {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      border: none;
      border-radius: 6px;
      padding: 10px 18px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .btn:hover {
      opacity: 0.85;
    }

    .btn-copy {
      background-color: var(--accent);
      color: #0d1117;
    }

    .btn-whatsapp {
      background-color: #25d366;
      color: #0d1117;
    }

    .btn-close {
      background-color: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }
  </style>
</head>
<body data-grid-size="{{ grid_size }}" data-ref-code="{{ ref_code }}" data-clicks-left="{{ clicks_left }}">
  <h1>Trova il Pixel Vincente</h1>
  <div id="counter">Click rimasti oggi: <strong id="clicks-left"></strong></div>
  <p id="message">Clicca su un pixel per giocare.</p>
  <div id="grid"></div>
  <div id="tooltip"></div>

  <div id="overlay">
    <div id="popup">
      <h2>⏳ Click esauriti!</h2>
      <p>Vuoi <strong>2 tentativi extra</strong>? Condividi questo link con un amico:</p>
      <div id="ref-link"></div>
      <div class="popup-buttons">
        <button class="btn btn-copy" id="btn-copy">📋 Copia link</button>
        <button class="btn btn-whatsapp" id="btn-whatsapp">💬 WhatsApp</button>
        <button class="btn btn-close" id="btn-close">Chiudi</button>
      </div>
    </div>
  </div>

  <script>
    const GRID_SIZE = parseInt(document.body.dataset.gridSize, 10);
    const REF_CODE = document.body.dataset.refCode;
    const grid = document.getElementById('grid');
    const tooltip = document.getElementById('tooltip');
    const message = document.getElementById('message');
    const clicksLeftEl = document.getElementById('clicks-left');
    const overlay = document.getElementById('overlay');
    const refLinkEl = document.getElementById('ref-link');
    const btnCopy = document.getElementById('btn-copy');
    const btnWhatsapp = document.getElementById('btn-whatsapp');
    const btnClose = document.getElementById('btn-close');
    let gameOver = false;

    clicksLeftEl.textContent = document.body.dataset.clicksLeft;
    grid.style.gridTemplateColumns = 'repeat(' + GRID_SIZE + ', 12px)';
    grid.style.gridTemplateRows = 'repeat(' + GRID_SIZE + ', 12px)';

    function buildRefLink(code) {
      return window.location.origin + '/?ref=' + code;
    }

    for (let y = 1; y <= GRID_SIZE; y++) {
      for (let x = 1; x <= GRID_SIZE; x++) {
        const pixel = document.createElement('div');
        pixel.className = 'pixel';
        pixel.dataset.x = x;
        pixel.dataset.y = y;
        grid.appendChild(pixel);
      }
    }

    grid.addEventListener('mousemove', (e) => {
      if (!e.target.classList.contains('pixel')) return;
      tooltip.textContent = 'X: ' + e.target.dataset.x + ', Y: ' + e.target.dataset.y;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY + 12) + 'px';
    });

    grid.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });

    function showPopup(refCode) {
      refLinkEl.textContent = buildRefLink(refCode || REF_CODE);
      overlay.classList.add('visible');
    }

    btnClose.addEventListener('click', () => {
      overlay.classList.remove('visible');
    });

    btnCopy.addEventListener('click', async () => {
      const link = refLinkEl.textContent;
      try {
        await navigator.clipboard.writeText(link);
        btnCopy.textContent = '✅ Copiato!';
      } catch (err) {
        const range = document.createRange();
        range.selectNodeContents(refLinkEl);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
        document.execCommand('copy');
        btnCopy.textContent = '✅ Copiato!';
      }
    });

    btnWhatsapp.addEventListener('click', () => {
      const link = refLinkEl.textContent;
      const text = encodeURIComponent('Gioca a Trova il Pixel Vincente! Usa il mio link: ' + link);
      window.open('https://wa.me/?text=' + text, '_blank');
    });

    grid.addEventListener('click', async (e) => {
      if (gameOver || !e.target.classList.contains('pixel')) return;
      const pixel = e.target;
      const x = parseInt(pixel.dataset.x, 10);
      const y = parseInt(pixel.dataset.y, 10);

      try {
        const response = await fetch('/check_pixel', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ x: x, y: y })
        });
        const data = await response.json();

        if (data.allowed === false) {
          message.textContent = data.message;
          message.className = 'lose';
          clicksLeftEl.textContent = '0';
          showPopup(data.ref_code);
          return;
        }

        if (typeof data.clicks_left === 'number') {
          clicksLeftEl.textContent = data.clicks_left;
        }

        message.textContent = data.message;
        if (data.win) {
          pixel.classList.add('winner');
          message.className = 'win';
          gameOver = true;
        } else {
          pixel.classList.add('wrong');
          message.className = 'lose';
        }
      } catch (err) {
        message.textContent = 'Errore di connessione al server.';
      }
    });
  </script>
</body>
</html>
